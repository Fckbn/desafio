<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ford - Contato</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="topo">
        <img src="img/logo-ford-256.png" alt="logo ford" class="topo-img">
        <nav class="topo-menu">
            <a class="topo-menu-home" href="index.html">Home</a>
            <a class="topo-menu-home" href="update.html">Lançamento</a>
            <a class="topo-menu-home" href="phone.html">Contato</a>
        </nav>
    </header>

        <main class="principal">
            <section class="contato-container">
                <div class="contato-imagem">
                    <img src="img/imagem_1.jpg" alt="Ford Ranger">
                </div>
                <div class="contato-card">
                    <h2>Sobre Você</h2>
                    <form class="contato-form">
                        <label class="contato-field">
                            <span>Nome*</span>
                            <input type="text" name="nome" placeholder="Nome" required>
                        </label>
                        <label class="contato-field">
                            <span>Sobrenome*</span>
                            <input type="text" name="sobrenome" placeholder="Sobrenome" required>
                        </label>
                        <label class="contato-field">
                            <span>E-mail*</span>
                            <input type="email" name="email" placeholder="seu@email.com" required>
                        </label>
                        <label class="contato-field">
                            <span>CPF*</span>
                            <input type="text" name="cpf" placeholder="000.000.000-00" required>
                        </label>
                        <label class="contato-field">
                            <span>Telefone*</span>
                            <input type="tel" name="telefone" placeholder="(11) 90000-0000" required>
                        </label>
                        <label class="contato-field">
                            <span>Como deseja ser contactado?</span>
                            <select name="contato" required>
                                <option value="">Escolha uma opção</option>
                                <option value="whatsapp">WhatsApp</option>
                                <option value="telefone">Telefone</option>
                                <option value="email">E-mail</option>
                            </select>
                        </label>
                        <button type="submit">Enviar</button>
                    </form>
                </div>
            </section>
        </main>

    <footer class="rodape">
            <p>Redes Sociais</p>
            <div class="imagens--rodape">
            <a href="https://www.instagram.com/ford/"><img src="img/instagram-logo-50.png" alt="instagram"></a>
            <a href="https://www.facebook.com/ford/?locale=pt_BR"><img src="img/facebook-50.png" alt="facebook"></a>
            <a href="https://www.youtube.com/user/ford"><img src="img/youtube-squared-50.png" alt="youtube"></a>
            </div>
            <a class="logo--rodape" href="index.html"> <img src="img/ford-96.png" alt=""></a>
    </footer>
</body>

</html>
