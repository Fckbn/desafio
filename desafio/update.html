<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ford - Lançamentos</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="topo">
        <img src="img/logo-ford-256.png" alt="logo ford" class="topo-img">
        <nav class="topo-menu">
            <a class="topo-menu-home" href="index.html">Home</a>
            <a class="topo-menu-home" href="update.html">Lançamento</a>
            <a class="topo-menu-home" href="phone.html">Contato</a>
        </nav>
    </header>

        <main class="principal">
            <section class="lancamentos-container">
                <div class="video-lancamento">
                    <iframe width="560" height="315" src="vids/YTDown.com_YouTube_Media_NBu5OGhF0OE_001_1080p.mp4" title="Ford Ranger 2022" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    
                </div>
                <div class="cards-lancamento">
                    <article class="car-card selected">
                        <img src="img/XL Cabine.jpg" alt="Ranger 2.2 Diesel">
                        <div class="car-card-info">
                            <div class="car-card-title-row">
                                <p class="car-card-title">Ranger 2.2 Diesel</p>
                                <img class="info-icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%230b3a79'%3E%3Ccircle cx='12' cy='12' r='10'/%3E%3Cpath d='M12 16h.01M11 7h2v6h-2z' stroke='%23ffffff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E" alt="info" title="Mais informações" />
                            </div>
                            <p>Equipada com 160 cv, 4x4, cabine dupla</p>
                            <label class="car-card-action">
                                <input type="checkbox" checked>
                                Selecionar
                            </label>
                        </div>
                    </article>
                    <article class="car-card">
                        <img src="img/xls 2.2 diesel.jpg" alt="Ranger 3.2 Diesel XLT 2022">
                        <div class="car-card-info">
                            <div class="car-card-title-row">
                                <p class="car-card-title">Ranger 3.2 Diesel XLT 2022</p>
                                <img class="info-icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%230b3a79'%3E%3Ccircle cx='12' cy='12' r='10'/%3E%3Cpath d='M12 16h.01M11 7h2v6h-2z' stroke='%23ffffff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E" alt="info" title="Mais informações" />
                            </div>
                            <p>Performance e robustez de 200 cv</p>
                            <label class="car-card-action">
                                <input type="checkbox">
                                Selecionar
                            </label>
                        </div>
                    </article>
                    <article class="car-card">
                        <img src="img/storm.jpg" alt="Ranger 3.2 Diesel XLS AT 2022">
                        <div class="car-card-info">
                            <div class="car-card-title-row">
                                <p class="car-card-title">Ranger 3.2 Diesel XLS AT 2022</p>
                                <img class="info-icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%230b3a79'%3E%3Ccircle cx='12' cy='12' r='10'/%3E%3Cpath d='M12 16h.01M11 7h2v6h-2z' stroke='%23ffffff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E" alt="info" title="Mais informações" />
                            </div>
                            <p>Conforto e tecnologia em cada viagem</p>
                            <label class="car-card-action">
                                <input type="checkbox">
                                Selecionar
                            </label>
                        </div>
                    </article>
                </div>
                <button class="btn-comparar">Comparar Carros</button>
            </section>
        </main>

    <footer class="rodape">
            <p>Redes Sociais</p>
            <div class="imagens--rodape">
            <a href="https://www.instagram.com/ford/"><img src="img/instagram-logo-50.png" alt="instagram"></a>
            <a href="https://www.facebook.com/ford/?locale=pt_BR"><img src="img/facebook-50.png" alt="facebook"></a>
            <a href="https://www.youtube.com/user/ford"><img src="img/youtube-squared-50.png" alt="youtube"></a>
            </div>
            <a class="logo--rodape" href="index.html"> <img src="img/ford-96.png" alt=""></a>
    </footer>
</body>

</html>
